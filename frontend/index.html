<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VyOmni 网络监控看板</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css?v=1784798391">
</head>
<body>
    <!-- 顶部全局状态栏 -->
    <header class="global-bar">
        <div class="bar-left">
            <i class="fas fa-network-wired"></i>
            <span id="hostname">加载中...</span>
        </div>
        <div class="bar-center">
            <span class="bar-title">VyOmni Monitor</span>
        </div>
        <div class="bar-right">
            <span class="update-time">
                <i class="fas fa-clock"></i>
                <span id="last-update">--:--:--</span>
            </span>
            <span class="data-freshness" id="data-freshness" title="数据新鲜度">
                <i class="fas fa-circle"></i>
            </span>
            <button class="nav-btn" id="nav-nodes" title="节点管理" onclick="openNodeManagementModal()">
                <i class="fas fa-server"></i> <span class="nav-label">节点</span>
            </button>
            <button class="theme-toggle" id="theme-toggle" title="切换主题">
                <i class="fas fa-moon" id="theme-icon"></i>
            </button>
        </div>
    </header>

    <main class="dashboard">
        <!-- 总部资源 -->
        <section class="section">
            <h2><i class="fas fa-server"></i> 总部资源</h2>
            <div class="hq-resource-card" id="hq-resource"></div>
        </section>

        <!-- 维度1：Peer 隧道状态矩阵 -->
        <section class="section">
            <h2><i class="fas fa-shield-alt"></i> 隧道状态（维度1）</h2>
            <div class="peer-grid" id="peer-grid"></div>
        </section>

        <!-- 维度2：分支资源矩阵 -->
        <section class="section">
            <h2><i class="fas fa-server"></i> 分支资源（维度2）</h2>
            <div class="branch-grid" id="branch-grid"></div>
        </section>

        <!-- 网络拓扑 + 分支地图（并排一行） -->
        <div class="topo-map-row">
            <section class="section topo-half">
                <h2><i class="fas fa-project-diagram"></i> 网络拓扑</h2>
                <div class="chart-panel topology-panel">
                    <div id="chart-topology" class="chart chart-half-height"></div>
                </div>
            </section>
            <section class="section map-half">
                <h2><i class="fas fa-map-marked-alt"></i> 分支地图</h2>
                <div class="chart-panel map-panel">
                    <div id="chart-map" class="chart chart-half-height"></div>
                </div>
            </section>
        </div>

        <!-- 趋势分析区 -->
        <section class="section">
            <h2><i class="fas fa-chart-line"></i> 流量趋势</h2>
            <div class="time-selector" id="time-selector">
                <button class="time-btn active" data-window="60">5min</button>
                <button class="time-btn" data-window="360">30min</button>
                <button class="time-btn" data-window="720">1h</button>
                <button class="time-btn" data-window="4320">6h</button>
                <button class="time-btn" data-window="17280">24h</button>
            </div>
            <div class="chart-container">
                <div class="chart-panel">
                    <h3>隧道总带宽</h3>
                    <div id="chart-tunnel-bw" class="chart"></div>
                </div>
                <div class="chart-panel">
                    <h3>分支资源负载</h3>
                    <div id="chart-branch-load" class="chart"></div>
                </div>
            </div>
        </section>

        <!-- 告警日志 -->
        <section class="section">
            <h2><i class="fas fa-bell"></i> 告警记录</h2>
            <div class="alert-log" id="alert-log">
                <div class="no-alerts">暂无告警</div>
            </div>
        </section>
        <!-- 节点管理面板（点击顶部[节点]按钮展开） -->
        <section class="section node-section" id="node-panel" style="display:none;"></section>
    </main>

    <!-- 模态弹窗 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-panel" id="modal-panel">
            <div class="modal-header">
                <h3 id="modal-title">详情</h3>
                <button class="modal-close" id="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- 告警音效 -->
    <audio id="alert-sound" preload="auto">
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <!-- 离线 JS -->
    <script src="assets/echarts.min.js?v=1784798391"></script>
    <script src="js/dashboard.js?v=1784798391"></script>
</body>
</html>
