<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VyOS WireGuard 监控看板</title>
    <!-- 离线资源 -->
    <link rel="stylesheet" href="/monitor/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/monitor/css/dashboard.css">
</head>
<body>
    <!-- 顶部全局状态栏 -->
    <header class="global-bar">
        <div class="bar-left">
            <i class="fas fa-network-wired"></i>
            <span id="hostname">加载中...</span>
        </div>
        <div class="bar-center">
            <div class="stat-item">
                <i class="fas fa-microchip"></i>
                <span>CPU</span>
                <strong id="global-cpu">--%</strong>
            </div>
            <div class="stat-item">
                <i class="fas fa-memory"></i>
                <span>内存</span>
                <strong id="global-mem">--%</strong>
            </div>
            <div class="stat-item">
                <i class="fas fa-link"></i>
                <span>隧道</span>
                <strong id="global-tunnel">- / -</strong>
            </div>
        </div>
        <div class="bar-right">
            <span class="update-time">
                <i class="fas fa-clock"></i>
                <span id="last-update">--:--:--</span>
            </span>
            <span class="data-freshness" id="data-freshness" title="数据新鲜度">
                <i class="fas fa-circle"></i>
            </span>
        </div>
    </header>

    <main class="dashboard">
        <!-- 维度1：Peer 隧道状态矩阵 -->
        <section class="section">
            <h2><i class="fas fa-shield-alt"></i> 隧道状态（维度1）</h2>
            <div class="peer-grid" id="peer-grid">
                <!-- 动态生成 -->
            </div>
        </section>

        <!-- 维度2：分支资源矩阵 -->
        <section class="section">
            <h2><i class="fas fa-server"></i> 分支资源（维度2）</h2>
            <div class="branch-grid" id="branch-grid">
                <!-- 动态生成 -->
            </div>
        </section>

        <!-- 趋势分析区 -->
        <section class="section">
            <h2><i class="fas fa-chart-line"></i> 流量趋势</h2>
            <div class="chart-container">
                <div class="chart-panel">
                    <h3>隧道总带宽</h3>
                    <div id="chart-tunnel-bw" class="chart"></div>
                </div>
                <div class="chart-panel">
                    <h3>分支资源负载</h3>
                    <div id="chart-branch-load" class="chart"></div>
                </div>
            </div>
        </section>

        <!-- 告警日志 -->
        <section class="section">
            <h2><i class="fas fa-bell"></i> 告警记录</h2>
            <div class="alert-log" id="alert-log">
                <div class="no-alerts">暂无告警</div>
            </div>
        </section>
    </main>

    <!-- 告警音效 -->
    <audio id="alert-sound" preload="auto">
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <!-- 离线 JS -->
    <script src="/monitor/assets/echarts.min.js"></script>
    <script src="/monitor/js/dashboard.js"></script>
</body>
</html>
