services:
  aggregator:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: vyomni-aggregator
    command: python3 -u aggregator.py
    # 不对外暴露，仅通过 nginx 代理访问
    expose:
      - "9100"
    volumes:
      - shared-data:/data
      - ./config.json:/app/config.json:ro
      - ./secrets.json:/app/secrets.json:ro
    environment:
      - DATA_DIR=/data
      - CONFIG_PATH=/app/config.json
      - SECRETS_PATH=/app/secrets.json
    restart: unless-stopped
    networks:
      - vyomni

  alerter:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: vyomni-alerter
    command: python3 -u alerter.py
    volumes:
      - shared-data:/data
      - ./alert.json:/app/alert.json:ro
    environment:
      - DATA_DIR=/data
      - ALERT_CONFIG_PATH=/app/alert.json
    restart: unless-stopped
    networks:
      - vyomni
    depends_on:
      - aggregator

  nginx:
    image: nginx:alpine
    container_name: vyomni-nginx
    ports:
      - "80:80"
    volumes:
      - ../frontend/index.html:/var/www/monitor/index.html:ro
      - ../frontend/css:/var/www/monitor/css:ro
      - ../frontend/js:/var/www/monitor/js:ro
      - ./assets:/var/www/monitor/assets:ro
      - shared-data:/var/www/monitor/data:ro
      - ../nginx/monitor.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - vyomni
    depends_on:
      - aggregator

volumes:
  shared-data:
    driver: local

networks:
  vyomni:
    driver: bridge
