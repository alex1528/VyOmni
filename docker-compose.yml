# VyOS WireGuard Monitor - Docker Compose
# 通过 install.sh 自动调用，或手动执行:
#   docker compose up -d --build
#
# 非 VyOS 环境推荐方式；VyOS 原生容器请参见 scripts/container_deploy.md

version: "3.8"

services:
  # 总部隧道采集器
  collector:
    build: ./collector
    container_name: wg-collector
    network_mode: host  # 需访问宿主 wg 命令
    restart: unless-stopped
    environment:
      - WG_MONITOR_CONFIG=/etc/wg-monitor/config.json
      - WG_MONITOR_OUTPUT=/output
      - WG_MONITOR_INTERVAL=5
    volumes:
      - /etc/wg-monitor/config.json:/etc/wg-monitor/config.json:ro
      - monitor-data:/output

  # 总部聚合器 API
  aggregator:
    build: ./aggregator
    container_name: wg-aggregator
    restart: unless-stopped
    ports:
      - "127.0.0.1:9100:9100"
    environment:
      - AGG_LISTEN_HOST=0.0.0.0
      - AGG_LISTEN_PORT=9100
      - AGG_SECRETS=/secrets/secrets.json
      - AGG_OUTPUT_DIR=/output
    volumes:
      - /etc/wg-monitor/secrets.json:/secrets/secrets.json:ro
      - monitor-data:/output
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:9100/health',timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Nginx + 前端
  nginx:
    image: nginx:1.25-alpine
    container_name: wg-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/monitor.conf:/etc/nginx/sites-enabled/monitor.conf:ro
      - ./frontend:/var/www/monitor:ro
      - monitor-data:/var/www/monitor/data:ro
    depends_on:
      - aggregator
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/monitor/"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  monitor-data:
    driver: local
