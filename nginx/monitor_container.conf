# VyOmni Nginx 配置（容器部署专用）
# proxy_pass 指向容器网络 aggregator IP

server {
    listen 8080;
    server_name _;
    root /var/www/monitor;

    # === 前端静态文件 ===
    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # === 离线静态资源（长缓存） ===
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # === 数据接口：隧道状态 ===
    location = /api/tunnel {
        alias /var/www/monitor/data/status-tunnel.json;
        default_type application/json;
        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin "*";
    }

    # === 数据接口：分支资源 ===
    location = /api/branches {
        alias /var/www/monitor/data/status-branches.json;
        default_type application/json;
        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin "*";
    }

    # === 数据接口：配置映射 ===
    location = /api/config {
        alias /var/www/monitor/data/config.json;
        default_type application/json;
        add_header Cache-Control "no-cache";
    }

    # === 聚合器 API 反向代理 ===
    location /api/report {
        proxy_pass http://172.20.0.11:9100/report;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }
}
