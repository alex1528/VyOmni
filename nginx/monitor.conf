# VyOmni Nginx 配置（Linux 监控服务器 - Docker Compose）

server {
    listen 80;
    server_name _;
    root /var/www/monitor;

    # === 前端静态文件 ===
    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # === 离线静态资源（长缓存） ===
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # === 所有 API 统一代理到 Aggregator ===
    location /api/ {
        proxy_pass http://vyomni-aggregator:9100/api/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # === 健康检查 ===
    location = /health {
        proxy_pass http://vyomni-aggregator:9100/health;
        proxy_read_timeout 5s;
    }
}
