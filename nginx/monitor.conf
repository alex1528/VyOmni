# VyOmni Nginx 配置 — 统一端口 8080（看板 + Agent 上报）

server {
    listen 80;
    server_name _;
    root /var/www/monitor;

    # === 前端静态文件 ===
    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # === JS/CSS 禁止缓存 ===
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # === 离线静态资源（长缓存） ===
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # === 所有 API 代理到 Aggregator ===
    location /api/ {
        proxy_pass http://vyomni-aggregator:9100/api/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_read_timeout 15s;
    }

    # === Agent 上报（POST /report）===
    location = /report {
        proxy_pass http://vyomni-aggregator:9100/report;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # === Agent 注册（POST /register）===
    location = /register {
        proxy_pass http://vyomni-aggregator:9100/register;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # === 健康检查 ===
    location = /health {
        proxy_pass http://vyomni-aggregator:9100/health;
        proxy_read_timeout 5s;
    }
}
