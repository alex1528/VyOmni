# systemd journal 日志轮转配置
# 部署路径: /etc/logrotate.d/wg-monitor
#
# 注：VyOS 使用 journald，以下为补充的文件日志轮转
# 如果将服务日志重定向到文件，则启用此配置

/var/log/wg-monitor/*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    create 0640 root root
    sharedscripts
    postrotate
        systemctl reload wg-collector 2>/dev/null || true
        systemctl reload wg-aggregator 2>/dev/null || true
    endscript
}
